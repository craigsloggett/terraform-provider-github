extends: relaxed

rules:
  comments:
    require-starting-space: true
    ignore-shebangs: true
    min-spaces-from-content: 1

  comments-indentation:
    level: error

  document-start:
    level: error
    present: false

  document-end:
    present: false

  empty-lines:
    max: 1

  indentation:
    spaces: 2

  line-length: disable

ignore: |
  .venv
