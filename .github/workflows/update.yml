name: Update

on:
  schedule:
    # Run weekly on Mondays at 10:00 UTC
    - cron: 0 10 * * 1
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

# Reusable workflow pinned to the unreleased branch HEAD for testing; repin to a release tag once cut.
jobs:
  update:
    uses: craigsloggett/github-workflows/.github/workflows/update-terraform-provider.yml@dc0e8ae8f85dff2de2fc5e2683324fc4063e07bc
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
