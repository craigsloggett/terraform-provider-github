name: Update

on:
  schedule:
    # Run weekly on Mondays at 10:00 UTC
    - cron: 0 10 * * 1
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    # Pinned to the unreleased branch HEAD for testing; repin to a release tag once cut.
    uses: craigsloggett/github-workflows/.github/workflows/update-terraform-provider-tooling.yml@5dd56f46f21a9ac0790ad1007e856c670367b8c1
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
