name: Update

on:
  schedule:
    # Run weekly on Mondays at 10:00 UTC
    - cron: 0 10 * * 1
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

# Reusable workflow pinned to the unreleased branch HEAD for testing; repin to a release tag once cut.
jobs:
  bump:
    name: Bump
    uses: craigsloggett/github-workflows/.github/workflows/update-terraform-provider.yml@7ba517ed7974dff928a2b37be42da227261db7b7
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
