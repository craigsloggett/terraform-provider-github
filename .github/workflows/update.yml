name: Update

on:
  schedule:
    # Run weekly on Mondays at 10:00 UTC
    - cron: 0 10 * * 1
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Tooling
    # Pinned to the unreleased branch HEAD for testing; repin to a release tag once cut.
    uses: craigsloggett/github-workflows/.github/workflows/update-terraform-provider-tooling.yml@17cb7b0eb12898e7a1d853d50e91285eec1c2e0b
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
