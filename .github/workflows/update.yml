# TODO: Extract individual tool updates into composite actions to reduce complexity.
name: Update

on:
  schedule:
    # Run weekly on Mondays at 10:00 UTC
    - cron: 0 10 * * 1
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  terraform:
    name: terraform
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Update Lint Workflow
        id: bump-terraform
        uses: craigsloggett/bump-terraform-cli@c8c2085bece33c03fcd0cac4d4c4e1d011f56173 # v1.0.9
        with:
          file: .github/workflows/lint.yml
          yaml_path: >-
            .jobs.terraform-fmt.steps[] |
            select(.uses | test("hashicorp/setup-terraform")) |
            .with.terraform_version

      - name: Publish Available Updates in Step Summary
        if: steps.bump-terraform.outputs.changed == 'true'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Updates Available\n\n'
            printf -- '- `terraform` can be updated in `%s` to `v%s`\n\n' \
              "${{ steps.bump-terraform.outputs.file }}" \
              "${{ steps.bump-terraform.outputs.version }}"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Create GitHub Pull Request
        if: steps.bump-terraform.outputs.changed == 'true'
        id: create-github-pull-request
        uses: craigsloggett/create-github-pull-request@29f3cbd0faff8c1bc2bfebc5cf1598fb8b6f417e # v1.1.0
        with:
          title: 'chore(ci): Bump Terraform to ${{ steps.bump-terraform.outputs.version }}'
          body: |
            Bump the pinned Terraform version used by the `terraform-fmt` job in `lint.yml`.

            *Generated by the scheduled `update.yml` workflow.*
          branch: update/bump-terraform-${{ steps.bump-terraform.outputs.version }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Publish Pull Request Details in Step Summary
        if: steps.create-github-pull-request.conclusion == 'success'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Pull Request Created\n\n'
            printf -- '- URL: %s\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Files changed: %s/files\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Commits: %s/commits\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Checks: %s/checks\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Branch tree: %s/tree/%s\n' \
              "${{ github.server_url }}/${{ github.repository }}" \
              "${{ steps.create-github-pull-request.outputs.branch }}"
          } >>"${GITHUB_STEP_SUMMARY}"

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Update Lint Workflow
        id: bump-govulncheck-lint
        uses: craigsloggett/bump-govulncheck@532c553b320d87c7bf2cdf0185fe3d11480ad3c4 # v0.1.4
        with:
          file: .github/workflows/lint.yml
          path: >-
            .jobs.govulncheck.steps[] |
            select(.run | test("go install golang.org/x/vuln/cmd/govulncheck")) |
            .run

      - name: Update Makefile
        id: bump-govulncheck-makefile
        uses: craigsloggett/bump-govulncheck@532c553b320d87c7bf2cdf0185fe3d11480ad3c4 # v0.1.4
        with:
          file: Makefile
          match: ^GOVULNCHECK_VERSION
          replace: GOVULNCHECK_VERSION   := {version}

      - name: Publish Available Updates in Step Summary
        if: >-
          steps.bump-govulncheck-lint.outputs.changed == 'true' ||
          steps.bump-govulncheck-makefile.outputs.changed == 'true'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Updates Available\n\n'
            printf -- '- `govulncheck` can be updated in `%s` and `%s` to `%s`\n\n' \
              '.github/workflows/lint.yml' \
              'Makefile' \
              "${{ steps.bump-govulncheck-lint.outputs.version }}"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Create GitHub Pull Request
        if: >-
          steps.bump-govulncheck-lint.outputs.changed == 'true' ||
          steps.bump-govulncheck-makefile.outputs.changed == 'true'
        id: create-github-pull-request
        uses: craigsloggett/create-github-pull-request@29f3cbd0faff8c1bc2bfebc5cf1598fb8b6f417e # v1.1.0
        with:
          title: 'chore(build): Bump govulncheck to ${{ steps.bump-govulncheck-lint.outputs.version }}'
          body: |
            Bump the pinned `govulncheck` version in `lint.yml` and `Makefile`.

            *Generated by the scheduled `update.yml` workflow.*
          branch: update/bump-govulncheck-${{ steps.bump-govulncheck-lint.outputs.version }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Publish Pull Request Details in Step Summary
        if: steps.create-github-pull-request.conclusion == 'success'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Pull Request Created\n\n'
            printf -- '- URL: %s\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Files changed: %s/files\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Commits: %s/commits\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Checks: %s/checks\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Branch tree: %s/tree/%s\n' \
              "${{ github.server_url }}/${{ github.repository }}" \
              "${{ steps.create-github-pull-request.outputs.branch }}"
          } >>"${GITHUB_STEP_SUMMARY}"

  update:
    strategy:
      fail-fast: false
      matrix:
        tool:
          - golangci-lint
          - tfplugindocs
    name: ${{ matrix.tool }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Get Latest Version
        id: latest-version
        run: |
          case "${{ matrix.tool }}" in
            golangci-lint)
              VERSION=$(go list -m -json github.com/golangci/golangci-lint/v2@latest | jq -r '.Version')
              ;;
            tfplugindocs)
              VERSION=$(go list -m -json github.com/hashicorp/terraform-plugin-docs@latest | jq -r '.Version')
              ;;
          esac
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Current Versions
        id: current-versions
        run: |
          case "${{ matrix.tool }}" in
            golangci-lint)
              WORKFLOW=$(sed -n '/^[[:space:]]*version:/s/.*version: //p' .github/workflows/lint.yml)
              MAKEFILE=$(sed -n 's/^GOLANGCI_LINT_VERSION := //p' Makefile)
              ;;
            tfplugindocs)
              WORKFLOW=$(sed -n 's/.*tfplugindocs@\([^ ]*\).*/\1/p' .github/workflows/lint.yml | head -1)
              MAKEFILE=$(sed -n 's/^TFPLUGINDOCS_VERSION[[:space:]]*:= //p' Makefile)
              ;;
          esac
          echo "workflow=${WORKFLOW}" >> "$GITHUB_OUTPUT"
          echo "makefile=${MAKEFILE}" >> "$GITHUB_OUTPUT"

      - name: Compare Versions
        id: compare-versions
        run: |
          LATEST="${{ steps.latest-version.outputs.version }}"
          WORKFLOW="${{ steps.current-versions.outputs.workflow }}"
          MAKEFILE="${{ steps.current-versions.outputs.makefile }}"
          if [ "${LATEST}" != "${WORKFLOW}" ] || [ "${LATEST}" != "${MAKEFILE}" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for an Existing Pull Request
        id: check-open-pull-requests
        if: steps.compare-versions.outputs.update == 'true'
        run: |
          BRANCH_NAME="update-${{ matrix.tool }}-${{ steps.latest-version.outputs.version }}"
          if gh pr list --head "${BRANCH_NAME}" --state open --json number \
            | jq -e '. | length > 0' >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Create Branch and Update Version
        if: steps.compare-versions.outputs.update == 'true' && steps.check-open-pull-requests.outputs.exists == 'false'
        run: |
          git config --global user.name "craigsloggett"
          git config --global user.email "684196+craigsloggett@users.noreply.github.com"

          LATEST="${{ steps.latest-version.outputs.version }}"
          BRANCH_NAME="update-${{ matrix.tool }}-${LATEST}"
          git checkout -b "${BRANCH_NAME}"

          case "${{ matrix.tool }}" in
            golangci-lint)
              sed -i "s/^GOLANGCI_LINT_VERSION := .*/GOLANGCI_LINT_VERSION := ${LATEST}/" Makefile
              sed -i "/^[[:space:]]*version:/s/version: v.*/version: ${LATEST}/" .github/workflows/lint.yml
              git add Makefile .github/workflows/lint.yml
              ;;
            tfplugindocs)
              sed -i "s/^TFPLUGINDOCS_VERSION[[:space:]]*:= .*/TFPLUGINDOCS_VERSION  := ${LATEST}/" Makefile
              sed -i "s/tfplugindocs@[^ ]*/tfplugindocs@${LATEST}/" .github/workflows/lint.yml
              git add Makefile .github/workflows/lint.yml
              ;;
          esac

          case "${{ matrix.tool }}" in
            terraform) PREFIX="ci" ;;
            *) PREFIX="build" ;;
          esac

          git commit -m "${PREFIX}: Update ${{ matrix.tool }} to ${LATEST}"

          git push origin "${BRANCH_NAME}"

          echo "BRANCH_NAME=${BRANCH_NAME}" >> "$GITHUB_ENV"

      - name: Create Pull Request
        if: steps.compare-versions.outputs.update == 'true' && steps.check-open-pull-requests.outputs.exists == 'false'
        run: |
          LATEST="${{ steps.latest-version.outputs.version }}"
          WORKFLOW="${{ steps.current-versions.outputs.workflow }}"

          case "${{ matrix.tool }}" in
            terraform) PREFIX="ci" ;;
            *) PREFIX="build" ;;
          esac

          PR_URL=$(gh pr create \
            --title "${PREFIX}: Update ${{ matrix.tool }} to ${LATEST}" \
            --body "Update ${{ matrix.tool }} from ${WORKFLOW} to ${LATEST}." \
            --base main \
            --head "${{ env.BRANCH_NAME }}")

          echo "::notice::Created pull request: ${PR_URL}"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
