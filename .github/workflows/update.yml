name: Update

on:
  schedule:
    # Run weekly on Mondays at 10:00 UTC
    - cron: 0 10 * * 1
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  terraform:
    name: terraform
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Update Lint Workflow
        id: bump-terraform
        uses: craigsloggett/bump-terraform-cli@d1aa8990a17228dbc62876846b7279048c745dce # v1.0.8
        with:
          file: .github/workflows/lint.yml
          yaml_path: >-
            .jobs.terraform-fmt.steps[] |
            select(.uses | test("hashicorp/setup-terraform")) |
            .with.terraform_version

      - name: Publish Available Updates in Step Summary
        if: steps.bump-terraform.outputs.changed == 'true'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Updates Available\n\n'
            printf -- '- `terraform` can be updated in `%s` to `v%s`\n\n' \
              "${{ steps.bump-terraform.outputs.file }}" \
              "${{ steps.bump-terraform.outputs.version }}"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Create GitHub Pull Request
        if: steps.bump-terraform.outputs.changed == 'true'
        id: create-github-pull-request
        uses: craigsloggett/create-github-pull-request@29f3cbd0faff8c1bc2bfebc5cf1598fb8b6f417e # v1.1.0
        with:
          title: 'chore(ci): Bump Terraform to ${{ steps.bump-terraform.outputs.version }}'
          body: |
            Bump the pinned Terraform version used by the `terraform-fmt` job in `lint.yml`.

            *Generated by the scheduled `update.yml` workflow.*
          branch: update/bump-terraform-${{ steps.bump-terraform.outputs.version }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Publish Pull Request Details in Step Summary
        if: steps.create-github-pull-request.conclusion == 'success'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Pull Request Created\n\n'
            printf -- '- URL: %s\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Files changed: %s/files\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Commits: %s/commits\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Checks: %s/checks\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Branch tree: %s/tree/%s\n' \
              "${{ github.server_url }}/${{ github.repository }}" \
              "${{ steps.create-github-pull-request.outputs.branch }}"
          } >>"${GITHUB_STEP_SUMMARY}"

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Update Lint Workflow
        id: bump-govulncheck-lint
        uses: craigsloggett/bump-govulncheck@862f0edb4a886efb0b2174dcd139f4d9f4041355 # v0.1.2
        with:
          file: .github/workflows/lint.yml
          path: >-
            .jobs.govulncheck.steps[] |
            select(.run | test("go install golang.org/x/vuln/cmd/govulncheck")) |
            .run

      - name: Update Makefile
        id: bump-govulncheck-makefile
        uses: craigsloggett/bump-govulncheck@862f0edb4a886efb0b2174dcd139f4d9f4041355 # v0.1.2
        with:
          file: Makefile
          match: ^GOVULNCHECK_VERSION
          replace: GOVULNCHECK_VERSION   := {version}

      - name: Publish Available Updates in Step Summary
        if: >-
          steps.bump-govulncheck-lint.outputs.changed == 'true' ||
          steps.bump-govulncheck-makefile.outputs.changed == 'true'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Updates Available\n\n'
            printf -- '- `govulncheck` can be updated in `%s` and `%s` to `%s`\n\n' \
              '.github/workflows/lint.yml' \
              'Makefile' \
              "${{ steps.bump-govulncheck-lint.outputs.version }}"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Create GitHub Pull Request
        if: >-
          steps.bump-govulncheck-lint.outputs.changed == 'true' ||
          steps.bump-govulncheck-makefile.outputs.changed == 'true'
        id: create-github-pull-request
        uses: craigsloggett/create-github-pull-request@29f3cbd0faff8c1bc2bfebc5cf1598fb8b6f417e # v1.1.0
        with:
          title: 'chore(build): Bump govulncheck to ${{ steps.bump-govulncheck-lint.outputs.version }}'
          body: |
            Bump the pinned `govulncheck` version in `lint.yml` and `Makefile`.

            *Generated by the scheduled `update.yml` workflow.*
          branch: update/bump-govulncheck-${{ steps.bump-govulncheck-lint.outputs.version }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Publish Pull Request Details in Step Summary
        if: steps.create-github-pull-request.conclusion == 'success'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Pull Request Created\n\n'
            printf -- '- URL: %s\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Files changed: %s/files\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Commits: %s/commits\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Checks: %s/checks\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Branch tree: %s/tree/%s\n' \
              "${{ github.server_url }}/${{ github.repository }}" \
              "${{ steps.create-github-pull-request.outputs.branch }}"
          } >>"${GITHUB_STEP_SUMMARY}"

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Update Lint Workflow
        id: bump-golangci-lint-workflow
        uses: craigsloggett/bump-golangci-lint@d1704fbd45b3f9c610ea79ca1e4ea108280c1e26 # v1.0.1
        with:
          file: .github/workflows/lint.yml
          path: >-
            .jobs["golangci-lint"].steps[] |
            select(.uses | test("golangci/golangci-lint-action")) |
            .with.version

      - name: Update Makefile
        id: bump-golangci-lint-makefile
        uses: craigsloggett/bump-golangci-lint@d1704fbd45b3f9c610ea79ca1e4ea108280c1e26 # v1.0.1
        with:
          file: Makefile
          match: ^GOLANGCI_LINT_VERSION
          replace: GOLANGCI_LINT_VERSION := {version}

      - name: Publish Available Updates in Step Summary
        if: >-
          steps.bump-golangci-lint-workflow.outputs.changed == 'true' ||
          steps.bump-golangci-lint-makefile.outputs.changed == 'true'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Updates Available\n\n'
            printf -- '- `golangci-lint` can be updated in `%s` and `%s` to `%s`\n\n' \
              '.github/workflows/lint.yml' \
              'Makefile' \
              "${{ steps.bump-golangci-lint-workflow.outputs.version }}"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Create GitHub Pull Request
        if: >-
          steps.bump-golangci-lint-workflow.outputs.changed == 'true' ||
          steps.bump-golangci-lint-makefile.outputs.changed == 'true'
        id: create-github-pull-request
        uses: craigsloggett/create-github-pull-request@29f3cbd0faff8c1bc2bfebc5cf1598fb8b6f417e # v1.1.0
        with:
          title: 'chore(build): Bump golangci-lint to ${{ steps.bump-golangci-lint-workflow.outputs.version }}'
          body: |
            Bump the pinned `golangci-lint` version in `lint.yml` and `Makefile`.

            *Generated by the scheduled `update.yml` workflow.*
          branch: update/bump-golangci-lint-${{ steps.bump-golangci-lint-workflow.outputs.version }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Publish Pull Request Details in Step Summary
        if: steps.create-github-pull-request.conclusion == 'success'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Pull Request Created\n\n'
            printf -- '- URL: %s\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Files changed: %s/files\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Commits: %s/commits\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Checks: %s/checks\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Branch tree: %s/tree/%s\n' \
              "${{ github.server_url }}/${{ github.repository }}" \
              "${{ steps.create-github-pull-request.outputs.branch }}"
          } >>"${GITHUB_STEP_SUMMARY}"

  tfplugindocs:
    name: tfplugindocs
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Update Lint Workflow
        id: bump-tfplugindocs-workflow
        uses: craigsloggett/bump-tfplugindocs@e093029aff028f0a84c3f3adc513f5d2503f125e # v1.0.1
        with:
          file: .github/workflows/lint.yml
          path: >-
            .jobs.tfplugindocs.steps[] |
            select(.run | test("tfplugindocs")) |
            .env.TFPLUGINDOCS_VERSION

      - name: Update Makefile
        id: bump-tfplugindocs-makefile
        uses: craigsloggett/bump-tfplugindocs@e093029aff028f0a84c3f3adc513f5d2503f125e # v1.0.1
        with:
          file: Makefile
          match: ^TFPLUGINDOCS_VERSION
          replace: TFPLUGINDOCS_VERSION  := {version}

      - name: Publish Available Updates in Step Summary
        if: >-
          steps.bump-tfplugindocs-workflow.outputs.changed == 'true' ||
          steps.bump-tfplugindocs-makefile.outputs.changed == 'true'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Updates Available\n\n'
            printf -- '- `tfplugindocs` can be updated in `%s` and `%s` to `%s`\n\n' \
              '.github/workflows/lint.yml' \
              'Makefile' \
              "${{ steps.bump-tfplugindocs-workflow.outputs.version }}"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Create GitHub Pull Request
        if: >-
          steps.bump-tfplugindocs-workflow.outputs.changed == 'true' ||
          steps.bump-tfplugindocs-makefile.outputs.changed == 'true'
        id: create-github-pull-request
        uses: craigsloggett/create-github-pull-request@29f3cbd0faff8c1bc2bfebc5cf1598fb8b6f417e # v1.1.0
        with:
          title: 'chore(build): Bump tfplugindocs to ${{ steps.bump-tfplugindocs-workflow.outputs.version }}'
          body: |
            Bump the pinned `tfplugindocs` version in `lint.yml` and `Makefile`.

            *Generated by the scheduled `update.yml` workflow.*
          branch: update/bump-tfplugindocs-${{ steps.bump-tfplugindocs-workflow.outputs.version }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Publish Pull Request Details in Step Summary
        if: steps.create-github-pull-request.conclusion == 'success'
        run: |-
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Pull Request Created\n\n'
            printf -- '- URL: %s\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Files changed: %s/files\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Commits: %s/commits\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Checks: %s/checks\n' \
              "${{ steps.create-github-pull-request.outputs.url }}"
            printf -- '- Branch tree: %s/tree/%s\n' \
              "${{ github.server_url }}/${{ github.repository }}" \
              "${{ steps.create-github-pull-request.outputs.branch }}"
          } >>"${GITHUB_STEP_SUMMARY}"
