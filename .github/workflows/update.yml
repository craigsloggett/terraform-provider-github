name: Update

on:
  schedule:
    # Run weekly on Mondays at 10:00 UTC
    - cron: 0 10 * * 1
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  bump:
    name: Bump
    # yamllint disable-line rule:line-length
    uses: craigsloggett/github-workflows/.github/workflows/update-terraform-provider.yml@172c3016c07e8e0bcc1ef3744667abc19641ad02 # v0.1.0
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
