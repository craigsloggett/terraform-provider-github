name: Update

on:
  schedule:
    # Run weekly on Mondays at 10:00 UTC
    - cron: 0 10 * * 1
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

# Reusable workflow pinned to the unreleased branch HEAD for testing; repin to a release tag once cut.
jobs:
  update:
    name: Update
    uses: craigsloggett/github-workflows/.github/workflows/update-terraform-provider.yml@e8468b0ee9c6ee05d9c3b64f9279bba09a77cf15
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
